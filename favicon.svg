<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SecureOrbit">
  <title>SecureOrbit</title>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#0A1A2F"/>
  <!-- faint outer halo -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="0.9"/>
  <!-- tilted orbital ring + sensor node -->
  <g transform="rotate(24 32 32)">
    <ellipse cx="32" cy="32" rx="28" ry="11.5" fill="none" stroke="#22D3EE" stroke-width="2.1"/>
    <circle cx="53.45" cy="24.61" r="4.8" fill="none" stroke="#22D3EE" stroke-width="1.8"/>
    <circle cx="53.45" cy="24.61" r="2.9" fill="#ffffff"/>
  </g>
  <!-- core -->
  <circle cx="32" cy="32" r="10.9" fill="#2DD4BF" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="4.6" fill="#0A1A2F"/>
</svg>
